name: Release

# Triggered by pushing a version tag:  git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

jobs:
  # ── Ubuntu → .deb ───────────────────────────────────────────────────────────
  release-ubuntu:
    name: Package (Ubuntu 22.04 → .deb)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6 + MPV
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            cmake ninja-build pkg-config \
            qt6-base-dev qt6-declarative-dev qt6-tools-dev \
            qt6-l10n-tools libqt6opengl6-dev qml6-module-qtquick \
            libmpv-dev

      - name: Cache TdLib
        id: cache-tdlib
        uses: actions/cache@v4
        with:
          path: ~/tdlib-install
          key: tdlib-1.8.61-ubuntu-22.04-${{ runner.arch }}

      - name: Build TdLib
        if: steps.cache-tdlib.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 --branch v1.8.61 https://github.com/tdlib/td.git ~/td
          cmake -B ~/td/build -S ~/td \
            -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=~/tdlib-install \
            -DTD_ENABLE_LTO=OFF
          cmake --build ~/td/build -j$(nproc)
          cmake --install ~/td/build

      - name: Build + package .deb
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cmake -B Plazma/build -S Plazma \
            -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DPROJECT_VERSION="$VERSION" \
            -DTd_DIR=~/tdlib-install/lib/cmake/Td
          cmake --build Plazma/build -j$(nproc)
          cd Plazma/build && cpack -G DEB

      - uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: Plazma/build/*.deb
          if-no-files-found: error

  # ── Arch Linux → .tar.zst ───────────────────────────────────────────────────
  release-arch:
    name: Package (Arch Linux → .pkg.tar.zst)
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            base-devel cmake ninja pkgconf git \
            qt6-base qt6-declarative qt6-tools qt6-svg \
            mpv tdlib

      - name: Build + package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cmake -B Plazma/build -S Plazma \
            -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr
          cmake --build Plazma/build -j$(nproc)
          cd Plazma/build && cpack -G TGZ

      - uses: actions/upload-artifact@v4
        with:
          name: arch-package
          path: Plazma/build/*.tar.gz
          if-no-files-found: error

  # ── macOS → .dmg ────────────────────────────────────────────────────────────
  release-macos:
    name: Package (macOS → .dmg)
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Install build deps via Homebrew
        run: |
          brew update
          brew install pkg-config gperf openssl@3 mpv ninja

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.3'
          host: mac
          target: desktop
          arch: clang_64
          modules: 'qtimageformats'
          cache: true

      - name: Cache TdLib install
        id: cache-tdlib
        uses: actions/cache@v4
        with:
          path: ~/tdlib-install
          key: tdlib-8fc2344-macos-14-${{ runner.arch }}-v1

      - name: Build TdLib from source
        if: steps.cache-tdlib.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/tdlib/td.git "$HOME/td"
          git -C "$HOME/td" checkout 8fc2344f3e3d
          cmake -B "$HOME/td/build" -S "$HOME/td" \
            -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$HOME/tdlib-install" \
            -DOPENSSL_ROOT_DIR="$(brew --prefix openssl@3)" \
            -DTD_ENABLE_LTO=OFF
          cmake --build "$HOME/td/build" -j$(sysctl -n hw.ncpu)
          cmake --install "$HOME/td/build"

      - name: Build + package .dmg
        env:
          PKG_CONFIG_PATH: /opt/homebrew/lib/pkgconfig
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cmake -B Plazma/build -S Plazma \
            -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            -DPROJECT_VERSION="$VERSION" \
            -DTd_DIR="$HOME/tdlib-install/lib/cmake/Td"
          cmake --build Plazma/build -j$(sysctl -n hw.ncpu)
          # Bundle Qt frameworks + libmpv into the .app via macdeployqt so the
          # resulting .dmg runs on a stock macOS without Qt or mpv installed.
          MACDEPLOYQT="$(dirname "$(which qmake)")/macdeployqt"
          if [ -d "Plazma/build/plazma.app" ] && [ -x "$MACDEPLOYQT" ]; then
            "$MACDEPLOYQT" Plazma/build/plazma.app -qmldir=Plazma/src
          fi
          cd Plazma/build && cpack -G DragNDrop || cpack -G TGZ

      - uses: actions/upload-artifact@v4
        with:
          name: macos-package
          path: |
            Plazma/build/*.dmg
            Plazma/build/*.tar.gz
          if-no-files-found: error

  # ── Windows → .zip ──────────────────────────────────────────────────────────
  release-windows:
    name: Package (Windows → .zip)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.3'
          host: windows
          target: desktop
          arch: win64_msvc2019_64
          modules: 'qtimageformats'
          cache: true

      - name: Setup MSVC dev environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: C:/vcpkg/installed
          key: vcpkg-tdlib-x64-windows-v1

      - name: Install TdLib via vcpkg
        run: vcpkg install tdlib:x64-windows

      - name: Cache MPV SDK
        id: cache-mpv
        uses: actions/cache@v4
        with:
          path: mpv-sdk
          key: mpv-sdk-20240714-c7e8d31

      - name: Download MPV SDK
        if: steps.cache-mpv.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $url = "https://downloads.sourceforge.net/project/mpv-player-windows/libmpv/mpv-dev-x86_64-20240714-git-c7e8d31.7z"
          Invoke-WebRequest -Uri $url -OutFile mpv-dev.7z
          7z x mpv-dev.7z -ompv-sdk
          Push-Location mpv-sdk
          lib /def:mpv.def /name:libmpv-2.dll /out:mpv.lib /MACHINE:X64
          Copy-Item mpv.lib libmpv.dll.a -Force
          Pop-Location

      - name: Build + package .zip
        shell: pwsh
        env:
          MPV_DIR: ${{ github.workspace }}/mpv-sdk
        run: |
          cmake -B Plazma/build -S Plazma -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DCMAKE_DISABLE_FIND_PACKAGE_PkgConfig=ON
          cmake --build Plazma/build
          # Qt DLLs + libmpv-2.dll are bundled via the install hook in
          # Plazma/cmake/packaging.cmake, so the resulting zip is self-contained.
          Push-Location Plazma/build
          cpack -G ZIP
          Pop-Location

      - name: Debug via tmate (on failure, manual dispatch only)
        if: failure() && github.event_name == 'workflow_dispatch'
        uses: mxschmitt/action-tmate@v3
        timeout-minutes: 30
        with:
          limit-access-to-actor: true

      - uses: actions/upload-artifact@v4
        with:
          name: windows-package
          path: Plazma/build/*.zip
          if-no-files-found: error

  # ── GitHub Release ──────────────────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    needs: [release-ubuntu, release-arch, release-macos, release-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: deb-package
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: arch-package
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: macos-package
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: windows-package
          path: dist/

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release create "$GITHUB_REF_NAME" dist/* \
            --title "Plazma $VERSION" \
            --notes "## Plazma $VERSION

          ### Downloads
          | Platform | File |
          |----------|------|
          | Ubuntu/Debian | \`plazma_${VERSION}_amd64.deb\` |
          | Arch Linux | \`plazma-${VERSION}-Linux.tar.gz\` |
          | macOS (Apple Silicon) | \`plazma-${VERSION}-Darwin.dmg\` |
          | Windows (portable) | \`plazma-${VERSION}-win64.zip\` |

          ### Install

          **Ubuntu/Debian**
          \`\`\`bash
          sudo dpkg -i plazma_${VERSION}_amd64.deb
          \`\`\`

          **Arch Linux (AUR)**
          \`\`\`bash
          yay -S plazma
          # or extract the tarball manually
          \`\`\`

          **macOS**
          Open the .dmg and drag Plazma to Applications. Unsigned —
          first launch needs Right-click → Open.

          **Windows**
          Extract the zip and run \`bin/plazma.exe\`.
          "
